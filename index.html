<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gabriel | Developer Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hidden SVG to define the rounded hexagon path for clip-path -->
  <svg width="0" height="0" style="position: absolute;">
    <defs>
      <clipPath id="rounded-hex-clip" clipPathUnits="objectBoundingBox">
        <path d="M 0.9567 0.4134 Q 1.0000 0.5000 0.9567 0.5866 L 0.7933 0.9134 Q 0.7500 1.0000 0.6634 1.0000 L 0.3366 1.0000 Q 0.2500 1.0000 0.2067 0.9134 L 0.0433 0.5866 Q 0.0000 0.5000 0.0433 0.4134 L 0.2067 0.0866 Q 0.2500 0.0000 0.3366 0.0000 L 0.6634 0.0000 Q 0.7500 0.0000 0.7933 0.0866 Z" />
      </clipPath>

      <!-- Reusable stroke for the border -->
      <g id="hex-stroke">
        <path d="M 95.67 35.80 Q 100.00 43.30 95.67 50.80 L 79.33 79.10 Q 75.00 86.60 66.34 86.60 L 33.66 86.60 Q 25.00 86.60 20.67 79.10 L 4.33 50.80 Q 0.00 43.30 4.33 35.80 L 20.67 7.50 Q 25.00 0.00 33.66 0.00 L 66.34 0.00 Q 75.00 0.00 79.33 7.50 Z"
              fill="none" stroke="var(--glass-border)" stroke-width="2" vector-effect="non-scaling-stroke" />
      </g>
    </defs>
  </svg>

  <!-- Hamburger Menu Toggle Button -->
  <button class="menu-toggle" aria-label="Toggle Menu">
    <span class="hamburger-box">
      <span class="hamburger-inner"></span>
    </span>
  </button>

  <!-- Full Screen Overlay Menu -->
  <div class="overlay-menu">
    <nav class="overlay-nav">
      <ul class="overlay-links">
        <li><a href="#home">Home</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </div>

  <!-- Background decorative hexagons (The Hive) -->
  <div id="hexagon-bg">
    <svg class="honeycomb-cluster" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
      <!-- Outline only, thin stroke, matches header_reference.png -->
      <g fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5">
      </g>
    </svg>
  </div>

  <div class="layout-wrapper">
    <!-- Main Content Area -->
    <main class="content-area">
      <section id="home" class="hero-section">
        <div class="hero-content">
          <h1>Hi, I'm Gabriel</h1>
          <h2>Creative Developer & Designer</h2>
          <a href="#projects" class="btn-cta">View My Work</a>
        </div>
      </section>

      <!-- Projects Section -->
      <section id="projects" class="projects-section">
        <!-- Content will be injected via JS -->
      </section>

      <!-- About Section -->
      <section id="about" class="about-section">
        <div class="placeholder-content">
          <h2>About Me</h2>
          <p>Passionate developer creating web experiences.</p>
        </div>
      </section>

      <!-- Contact Section -->
      <section id="contact" class="contact-section">
        <div class="placeholder-content">
          <h2>Contact</h2>
          <p>Let's work together.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <script src="main.js"></script>
</body>
</html>
