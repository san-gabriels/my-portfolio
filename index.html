<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gabriel's Portfolio</title>

  <!-- Inter font from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <!-- GSAP via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>

  <!-- Background Layer -->
  <div id="hex-bg">
    <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <!-- 10 large rounded hexagons -->
      <g stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none" stroke-linejoin="round">
        <path d="M 150 50 L 250 100 L 250 200 L 150 250 L 50 200 L 50 100 Z" />
        <path d="M 450 150 L 550 200 L 550 300 L 450 350 L 350 300 L 350 200 Z" />
        <path d="M 800 50 L 900 100 L 900 200 L 800 250 L 700 200 L 700 100 Z" />
        <path d="M 1100 250 L 1200 300 L 1200 400 L 1100 450 L 1000 400 L 1000 300 Z" />
        <path d="M 200 450 L 300 500 L 300 600 L 200 650 L 100 600 L 100 500 Z" />
        <path d="M 600 500 L 700 550 L 700 650 L 600 700 L 500 650 L 500 550 Z" />
        <path d="M 900 600 L 1000 650 L 1000 750 L 900 800 L 800 750 L 800 650 Z" />
        <path d="M 50 800 L 150 850 L 150 950 L 50 1000 L -50 950 L -50 850 Z" />
        <path d="M 400 850 L 500 900 L 500 1000 L 400 1050 L 300 1000 L 300 900 Z" />
        <path d="M 1200 700 L 1300 750 L 1300 850 L 1200 900 L 1100 850 L 1100 750 Z" />
      </g>
    </svg>
  </div>

  <!-- Navigation -->
  <div id="nav-toggle">
    <div class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <div id="nav-overlay">
    <nav>
      <ul>
        <li><a href="#header">Home</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </div>

  <!-- Header Section -->
  <header id="header" class="full-screen">
    <div class="header-content">
      <h1>Hi, I'm Gabriel</h1>
      <p class="subtitle">Software Engineer & Web Developer</p>
    </div>
  </header>

  <!-- Projects Container -->
  <section id="projects">
    <!-- Projects will be injected here dynamically -->
  </section>

  <!-- About Section -->
  <section id="about" class="full-screen">
    <h2>About Me</h2>
    <p>This is a placeholder for the About section.</p>
  </section>

  <!-- Contact Section -->
  <section id="contact" class="full-screen">
    <h2>Contact</h2>
    <p>This is a placeholder for the Contact section.</p>
  </section>

  <script src="main.js"></script>
</body>
</html>
