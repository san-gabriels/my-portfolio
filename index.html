<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gabriel | Developer Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hidden SVG to define the rounded hexagon path for clip-path -->
  <svg width="0" height="0" style="position: absolute;">
    <defs>
      <clipPath id="rounded-hex-clip" clipPathUnits="objectBoundingBox">
        <path d="M 0.9567 0.4134 Q 1.0000 0.5000 0.9567 0.5866 L 0.7933 0.9134 Q 0.7500 1.0000 0.6634 1.0000 L 0.3366 1.0000 Q 0.2500 1.0000 0.2067 0.9134 L 0.0433 0.5866 Q 0.0000 0.5000 0.0433 0.4134 L 0.2067 0.0866 Q 0.2500 0.0000 0.3366 0.0000 L 0.6634 0.0000 Q 0.7500 0.0000 0.7933 0.0866 Z" />
      </clipPath>

      <!-- Reusable stroke for the border -->
      <g id="hex-stroke">
        <path d="M 95.67 35.80 Q 100.00 43.30 95.67 50.80 L 79.33 79.10 Q 75.00 86.60 66.34 86.60 L 33.66 86.60 Q 25.00 86.60 20.67 79.10 L 4.33 50.80 Q 0.00 43.30 4.33 35.80 L 20.67 7.50 Q 25.00 0.00 33.66 0.00 L 66.34 0.00 Q 75.00 0.00 79.33 7.50 Z"
              fill="none" stroke="var(--glass-border)" stroke-width="2" vector-effect="non-scaling-stroke" />
      </g>
    </defs>
  </svg>

  <!-- Background decorative hexagons -->
  <div class="background-grid">
    <div class="hex-bg h-1">
      <svg viewBox="0 0 100 86.6" preserveAspectRatio="none"><use href="#hex-stroke"></use></svg>
    </div>
    <div class="hex-bg h-2">
      <svg viewBox="0 0 100 86.6" preserveAspectRatio="none"><use href="#hex-stroke"></use></svg>
    </div>
    <div class="hex-bg h-3">
      <svg viewBox="0 0 100 86.6" preserveAspectRatio="none"><use href="#hex-stroke"></use></svg>
    </div>
    <div class="hex-bg h-4">
      <svg viewBox="0 0 100 86.6" preserveAspectRatio="none"><use href="#hex-stroke"></use></svg>
    </div>
    <div class="hex-bg h-5">
      <svg viewBox="0 0 100 86.6" preserveAspectRatio="none"><use href="#hex-stroke"></use></svg>
    </div>
  </div>

  <div class="layout-wrapper">
    <!-- Vertical Navigation (Left) -->
    <nav class="side-nav">
      <ul class="nav-links">
        <li>
          <a href="#home" class="active">
            <span class="icon">🏠</span>
            <span class="text">Home</span>
          </a>
        </li>
        <li>
          <a href="#about">
            <span class="icon">👤</span>
            <span class="text">About</span>
          </a>
        </li>
        <li>
          <a href="#projects">
            <span class="icon">💻</span>
            <span class="text">Projects</span>
          </a>
        </li>
        <li>
          <a href="#contact">
            <span class="icon">✉️</span>
            <span class="text">Contact</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Main Content Area -->
    <main class="content-area">
      <section id="home" class="hero-section">
        <!-- Visual Anchor: Large central transparent Glass Hexagon -->
        <div class="hero-anchor">
          <svg viewBox="0 0 100 86.6" preserveAspectRatio="none"><use href="#hex-stroke"></use></svg>
        </div>

        <div class="hero-content">
          <h1>Hi, I'm Gabriel</h1>
          <p>Creative Developer & Designer</p>
          <a href="#projects" class="btn-cta">View My Work</a>
        </div>
      </section>
    </main>
  </div>

</body>
</html>
